<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jobsy</title>
    <script src="background.js" defer></script>
    <script src="content.js" defer></script>
    <script src="popup.js" defer></script>
    <style>
      * {
        margin: 0;
        padding: 0;
      }

      #logout {
        display: none;
      }

      #loginForm {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      body {
        width: 20rem;
        background-color: oklch(42.4% 0.199 265.638);
        margin: 1rem;
      }

      #email,
      #password {
        font-size: 1rem;
        padding: 0.5rem;
      }

      #login,
      #logout {
        font-size: 1.2rem;
        padding: 0.5rem;
        font-weight: bold;
        background-color: oklch(37.9% 0.146 265.522);
        color: white;
        border: 1px solid white;
        border-radius: 0.5rem;
        cursor: pointer;
        transition: all;
        transition-duration: 100ms;
      }

      #login:hover {
        background-color: oklch(54.6% 0.245 262.881);
      }

      #logout {
        font-size: 1rem;
        padding: 0.5rem;
        background-color: oklch(57.7% 0.245 27.325);
        height: max-content;
      }

      #logout:hover {
        background-color: oklch(50.5% 0.213 27.518);
      }

      #header {
        margin: 0;
        padding: 0;
        color: white;
        display: flex;
        justify-content: space-between;
        margin-bottom: 1rem;
      }

      #header-one {
        font-size: 2.5rem;
        font-weight: bold;
      }

      #header-two {
        font-size: 1.5rem;
        font-weight: bold;
      }

      #subtitle {
        margin-bottom: 5px;
        color: white;
      }

      #status {
        margin-top: 5px;
      }

      #job-preview-form {
        display: none;
        color: white;
        margin: 1rem 0;
        margin-top: 0;
      }

      .job-details {
        display: flex;
        justify-content: space-between;
        margin-bottom: 1rem;
      }

      .job-details > p {
        width: 100%;
      }

      .job-details > h3 {
        align-self: flex-start;
        width: 550px;
      }

      .job-details > select {
        border: none;
        border-radius: 0.5rem;
        align-self: flex-start;
        padding: 0.5rem;
        width: 180px;
      }

      #confirmBtn {
        width: 100%;
        padding: 0.5rem;
        border: 1px solid white;
        font-size: 1rem;
        border-radius: 0.5rem;
        font-weight: bold;
        cursor: pointer;
        background-color: oklch(37.9% 0.146 265.522);
        transition: all;
        transition-duration: 100ms;
        color: white;
      }

      #confirmBtn:hover {
        background-color: oklch(54.6% 0.245 262.881);
      }

      #instruction-div {
        border: 1px solid black;
        border-radius: 0.2rem;
        background-color: white;
        padding: 0.5rem;
      }

      #loading-overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.8);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: white;
        border-radius: 0.5rem;
        z-index: 10;
      }

      .loading-hidden {
        display: none !important;
      }

      .spinner {
        width: 30px;
        height: 30px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-top: 3px solid white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 0.5rem;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      #job-preview-form.loading input,
      #job-preview-form.loading select,
      #job-preview-form.loading button {
        opacity: 0.5;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="header">
      <div>
        <div>
          <span id="header-one">J</span><span id="header-two">obsy</span>
        </div>

        <div id="subtitle">
          <div id="subtitle-text">Keep track of your jobs anywhere!</div>
          <div id="status"></div>
        </div>
      </div>

      <button id="logout">Logout</button>
    </div>

    <form id="loginForm">
      <input id="email" type="email" placeholder="Email" required />
      <input id="password" type="password" placeholder="Password" required />
      <button type="submit" class="btn" id="login">Login</button>
    </form>

    <!-- Display job preview -->
    <form id="job-preview-form">
      <div id="instruction-div">
        <p style="color: red">
          Please review details of job and click confirm to save to your Jobsy
          account.
        </p>
      </div>

      <div class="job-details" style="margin-top: 0.5rem">
        <p>Title:</p>
        <h3 id="job-title-text"></h3>
        <input type="text" name="title" id="job-title" hidden />
      </div>

      <div class="job-details">
        <p>Company:</p>
        <h3 id="job-company-text"></h3>
        <input type="text" name="company" id="job-company" hidden />
      </div>

      <div class="job-details">
        <p>Industry:</p>
        <h3 id="job-industry-text"></h3>
        <input type="text" name="industry" id="job-industry" hidden />
      </div>

      <div class="job-details">
        <p>Type:</p>
        <h3 id="job-type-text"></h3>
        <input type="text" name="type" id="job-type" hidden />
      </div>

      <div class="job-details">
        <p>Location:</p>
        <h3 id="job-location-text"></h3>
        <select name="location" id="job-location"></select>
      </div>

      <div class="job-details">
        <p>Advertised Salary:</p>
        <h3 id="advertised-salary-text"></h3>
        <input
          type="text"
          name="advertised_salary"
          id="advertised_salary"
          hidden
        />
      </div>

      <!-- Hidden input for the job posting link -->
      <input type="text" name="job_link" id="job_link" hidden />

      <!-- Confirmation button -->
      <button type="submit" id="confirmBtn">Confirm</button>

      <div id="loading-overlay" class="loading-hidden">
        <div class="spinner"></div>
        <p>Saving job...</p>
      </div>
    </form>
  </body>
</html>
